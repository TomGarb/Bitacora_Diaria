<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Credenciales - Datacenter</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header class="navbar">
        <h1>Credenciales A100</h1>
    </header>

    <main class="container two-columns">
        <!-- Izquierda: Carga Masiva -->
        <section class="form-section">
            <h2>Registrar Credenciales (Carga Masiva)</h2>
            <form id="bulk-form">
                <div class="section-box">
                    <h3>1. Datos Comunes del Ingreso</h3>
                    <div class="grid-2">
                        <div class="form-group"><label>Nuestro Ticket:</label><input type="text" id="our-ticket" required></div>
                        <div class="form-group"><label>Ticket Cliente:</label><input type="text" id="client-ticket" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Autorizado por (Aprobante):</label><input type="text" id="auth-by" required></div>
                        <div class="form-group"><label>Fecha de Recepción:</label><input type="date" id="recv-date" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Fecha Inicio:</label><input type="date" id="start-date" required></div>
                        <div class="form-group"><label>Hora Inicio:</label><input type="time" id="start-time" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Fecha Fin (Opcional):</label><input type="date" id="end-date"></div>
                        <div class="form-group"><label>Hora Fin (Opcional):</label><input type="time" id="end-time"></div>
                    </div>
                    <div class="form-group"><label>Observaciones:</label><textarea id="observations" rows="2"></textarea></div>
                </div>

                <div class="section-box">
                    <h3>2. Ingresantes</h3>
                    <div id="people-container">
                        <!-- Fila base -->
                        <div class="person-row">
                            <input type="text" class="p-fname" placeholder="Nombre" required>
                            <input type="text" class="p-lname" placeholder="Apellido" required>
                            <input type="text" class="p-code" placeholder="Código (Ej. A123)" pattern="[a-zA-Z0-9]+" required title="Solo letras y números">
                            <button type="button" class="btn-danger" onclick="removeRow(this)" disabled>X</button>
                        </div>
                    </div>
                    <button type="button" class="btn-info" onclick="addPersonRow()">+ Añadir otro ingresante</button>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1em; padding: 12px;">Guardar Todas las Credenciales</button>
            </form>
        </section>

        <!-- Derecha: Tabla -->
        <section class="list-section">
            <h2>Credenciales Activas</h2>
            <div class="table-container">
                <table id="cred-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Tickets (N/C)</th>
                            <th>Vencimiento</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cred-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Edición Individual -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content" style="width: 500px; max-height: 90vh; overflow-y: auto;">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h3>Editar Credencial Individual</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="grid-2">
                    <div class="form-group"><label>Nombre:</label><input type="text" id="e-fname" required></div>
                    <div class="form-group"><label>Apellido:</label><input type="text" id="e-lname" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Código:</label><input type="text" id="e-code" required></div>
                    <div class="form-group"><label>Aprobante:</label><input type="text" id="e-auth" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Nuestro Ticket:</label><input type="text" id="e-oticket" required></div>
                    <div class="form-group"><label>Ticket Cliente:</label><input type="text" id="e-cticket" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Fecha Fin:</label><input type="date" id="e-enddate"></div>
                    <div class="form-group"><label>Hora Fin:</label><input type="time" id="e-endtime"></div>
                </div>
                <!-- Campos ocultos requeridos por el backend pero que rara vez se editan -->
                <input type="hidden" id="e-recvdate"><input type="hidden" id="e-startdate"><input type="hidden" id="e-starttime"><input type="hidden" id="e-obs">
                
                <button type="submit" class="btn-primary" style="width: 100%;">Guardar Cambios</button>
            </form>
        </div>
    </div>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/credentials_manager.js"></script>
</body>
</html>
