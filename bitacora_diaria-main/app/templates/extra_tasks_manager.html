<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tareas Extra - Datacenter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .time-badge { background-color: #2c3e50; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <header class="navbar">
        <h1>Tareas Extra</h1>
    </header>

    <main class="container two-columns">
        <section class="form-section">
            <h2 id="form-title">Registrar Tarea Extra</h2>
            <form id="extra-task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label>Título / Referencia de la Tarea:</label>
                    <input type="text" id="title" required placeholder="Ej. Ordenamiento de sala de tableros">
                </div>

                <fieldset style="border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; padding: 10px;">
                    <legend style="font-weight: bold; color: #555;">Tiempo Empleado</legend>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Horas:</label>
                            <input type="number" id="hours" min="0" max="24" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Minutos:</label>
                            <input type="number" id="minutes" min="0" max="59" value="0" required>
                        </div>
                    </div>
                </fieldset>

                <div class="form-group">
                    <label>Observaciones / Detalle:</label>
                    <textarea id="observations" rows="4" placeholder="Describe brevemente lo realizado..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Tarea</button>
                    <button type="button" id="btn-cancel-edit" class="btn-secondary hidden">Cancelar Edición</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Tareas Realizadas (Últimas 24h)</h2>
            <div class="table-container">
                <table id="tasks-table">
                    <thead>
                        <tr>
                            <th>Título de Tarea</th>
                            <th>Tiempo Empleado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/extra_tasks_manager.js"></script>
</body>
</html>
