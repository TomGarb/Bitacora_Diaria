<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Accesos y Movimientos - Datacenter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <header class="navbar">
        <h1>Accesos y Movimientos</h1>
    </header>

    <main class="container two-columns">
        <section class="form-section">
            <h2 id="form-title">Registrar Nuevo Acceso</h2>
            <form id="access-form">
                <input type="hidden" id="acc-id">
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Nro Ticket:</label>
                        <input type="text" id="ticket" required>
                    </div>
                    <div class="form-group">
                        <label>Cliente:</label>
                        <input type="text" id="client" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Título / Referencia:</label>
                    <input type="text" id="title" required>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Sitio (DC):</label>
                        <input type="text" name="site" id="act-site" class="autocomplete-site" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Movimiento:</label>
                        <select id="type" required>
                            <option value="Ingreso de personal">Ingreso de personal</option>
                            <option value="Ingreso de elementos">Ingreso de elementos</option>
                            <option value="Retiro de elementos">Retiro de elementos</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Fecha de Solicitud:</label>
                        <input type="date" id="req-date" required>
                    </div>
                    <div class="form-group">
                        <label>Estado:</label>
                        <select id="status" required>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En progreso">En progreso</option>
                            <option value="Completado">Completado</option>
                            <option value="Cancelado">Cancelado (Inactivo)</option>
                            <option value="Sin estado">Sin estado</option>
                        </select>
                    </div>
                </div>

                <hr>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Fecha Inicio:</label>
                        <input type="date" id="start-date" required>
                    </div>
                    <div class="form-group">
                        <label>Hora Inicio:</label>
                        <input type="time" id="start-time" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Fecha Fin (Opcional):</label>
                        <input type="date" id="end-date">
                    </div>
                    <div class="form-group">
                        <label>Hora Fin (Opcional):</label>
                        <input type="time" id="end-time">
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción / Observaciones:</label>
                    <textarea id="observations" rows="3"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Registro</button>
                    <button type="button" id="btn-cancel-edit" class="btn-secondary hidden">Cancelar Edición</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Accesos Vigentes</h2>
            <div class="table-container">
                <table id="accesses-table">
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Tipo / Info</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="accesses-body">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/theme.js"></script>

    <script src="/static/js/accesses_manager.js"></script>
</body>
</html>
