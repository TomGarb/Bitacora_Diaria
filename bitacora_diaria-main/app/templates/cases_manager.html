<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Casos - Datacenter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header class="navbar">
        <h1>Gestión de Casos</h1>
    </header>

    <main class="container two-columns">
        <section class="form-section">
            <h2 id="form-title">Registrar Nuevo Caso</h2>
            <form id="case-form">
                <input type="hidden" id="case-id">
                
                <div class="form-group">
                    <label for="ticket">Nro Ticket:</label>
                    <input type="text" id="ticket" required>
                </div>
                
                <div class="form-group">
                    <label for="title">Título de la Incidencia:</label>
                    <input type="text" id="title" required>
                </div>
                
                <div class="form-group">
                    <label for="client">Cliente:</label>
                    <input type="text" id="client" required>
                </div>
                
                <div class="form-group">
                    <label for="status">Estado:</label>
                    <select id="status" required>
                        <option value="En progreso">En progreso</option>
                        <option value="Resuelto">Resuelto</option>
                        <option value="Pausado">Pausado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="observations">Observaciones / Descripción:</label>
                    <textarea id="observations" rows="4"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Caso</button>
                    <button type="button" id="btn-cancel-edit" class="btn-secondary hidden">Cancelar Edición</button>
                </div>
            </form>

            
        </section>

        <section class="list-section">
            <h2>Casos Activos (Últimas 24h)</h2>
            <div class="table-container">
                <table id="cases-table">
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Cliente</th>
                            <th>Título</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cases-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="subtask-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeSubtaskModal()">&times;</span>
            <h3>Añadir Subtarea a: <span id="modal-case-ticket" class="text-primary"></span></h3>
            <form id="subtask-form">
                <input type="hidden" id="modal-case-id">
                
                <div class="form-group">
                    <label for="st-ticket">Nro Ticket Subtarea:</label>
                    <input type="text" id="st-ticket" required>
                </div>
                <div class="form-group">
                    <label for="st-title">Título:</label>
                    <input type="text" id="st-title" required>
                </div>
                <div class="form-group">
                    <label for="st-status">Estado:</label>
                    <select id="st-status">
                        <option value="En progreso">En progreso</option>
                        <option value="Resuelto">Resuelto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="st-obs">Descripción:</label>
                    <textarea id="st-obs" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">Guardar Subtarea</button>
            </form>
        </div>
    </div>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/cases_manager.js"></script>
</body>
</html>
