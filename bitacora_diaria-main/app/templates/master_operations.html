<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Workspace Operaciones - Datacenter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* Estilos para transformar el layout en vertical con sub-header */
        .ops-layout-vertical {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 100%;
        }

        .ops-subheader {
            display: flex;
            gap: 15px;
            background: #ffffff;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto; /* Permite hacer scroll horizontal si la pantalla es chica */
            white-space: nowrap;
            align-items: center;
        }

        /* Soporte para modo oscuro del sub-header */
        body.dark-mode .ops-subheader {
            background: #1e293b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .ops-nav-item {
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s ease;
            background: #f8fafc;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }

        body.dark-mode .ops-nav-item {
            background: #0f172a;
            color: #94a3b8;
            border-color: #334155;
        }

        .ops-nav-item:hover {
            background: #e2e8f0;
            color: #3b82f6;
        }

        body.dark-mode .ops-nav-item:hover {
            background: #334155;
            color: #60a5fa;
        }

        .ops-nav-item.active {
            background: #8b5cf6 !important;
            color: white !important;
            border-color: #8b5cf6 !important;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }

        .ops-content-full {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Oculta la barra de scroll en el subheader pero permite el arrastre */
        .ops-subheader::-webkit-scrollbar {
            height: 6px;
        }
        .ops-subheader::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        body.dark-mode .ops-subheader::-webkit-scrollbar-thumb {
            background-color: #475569;
        }
    </style>
</head>
<body class="dashboard-body">

    <header class="top-bar">
        <div class="top-date">📅 <span id="current-date">Cargando fecha...</span></div>
        <div onclick="openSupportCenter()" style="position: relative; cursor: pointer; margin-right: 20px; font-size: 1.5rem;" title="Centro de Soporte">
            🔔 <span id="bell-badge" style="position: absolute; top: -5px; right: -10px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; display: none;">0</span>
        </div>
        <nav class="nav-links-modern">
            <a href="/shift/">🏠 Dashboard</a>
            <a href="/operations/" class="tab-btn active">⚙️ Operaciones</a>
            <a href="/history/">📜 Histórico</a>
            <a href="/master-data/">🗄️ Datos Maestros</a>
            <a href="/metrics/">📊 Métricas</a>
            <a href="#" onclick="toggleTheme(event)" class="theme-toggle-icon" style="background: transparent; border: 1px solid currentColor; margin-left: 15px;">🌙 Modo Oscuro</a>
        </nav>
    
        <div class="top-user" style="display: flex; align-items: center; gap: 15px;">
            <span><strong>Operador:</strong> {{ user_name }}</span>
            
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9em; border: 1px solid #ef4444; padding: 4px 8px; border-radius: 4px;" title="Cerrar sesión">
                🚪 Salir
            </a>
        </div>
    </header>

    <main class="ops-layout-vertical">
        <nav class="ops-subheader">
            <div class="ops-nav-item active" onclick="switchOpTab('/cases/', this)">🎫 Gestión de Casos</div>
            <div class="ops-nav-item" onclick="switchOpTab('/activities/', this)">📅 Planificadas y Próximas</div>
            <div class="ops-nav-item" onclick="switchOpTab('/accesses/', this)">🚪 Accesos/IN/OUT</div>
            <div class="ops-nav-item" onclick="switchOpTab('/credentials/', this)">🔐 Credenciales A100</div>
            <div class="ops-nav-item" onclick="switchOpTab('/extra-tasks/', this)">⚡ Tareas Extra</div>
            <div class="ops-nav-item" onclick="switchOpTab('/notes/', this)">📋 Notas turno</div>
            <div class="ops-nav-item" onclick="switchOpTab('/external-cases/', this)">🌎 Sitios Externos (Chile/MIA)</div>
        </nav>

        <div class="ops-content-full">
            <iframe id="ops-frame" src="/cases/" style="width: 100%; height: 75vh; border: none; border-radius: 12px; background: transparent;"></iframe>
        </div>
    </main>
    
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/master_operations.js"></script>
</body>
</html>
